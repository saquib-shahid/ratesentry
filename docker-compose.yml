services:
  mongo:
    image: mongo:6
    container_name: rl-mongo
    ports:
      - "27017:27017"
    volumes:
      - rl_mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: rl-redis
    ports:
      - "6379:6379"
    volumes:
      - rl_redisdata:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: rl-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  rate-limiter-service:
    build: ./rate-limiter-service
    container_name: rl-service
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ratelimiter
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - mongo
      - redis

volumes:
  rl_mongodata:
  rl_redisdata:
