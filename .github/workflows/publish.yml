name: Publish to npm and GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - 'rate-limiter-service/package.json'  # only runs when version changes

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rate-limiter-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npmjs.com
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      packages: write
      contents: read
    defaults:
      run:
        working-directory: rate-limiter-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@saquib-shahid'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Scope package name for GitHub Packages
        run: |
          jq '.name = "@saquib-shahid/ratesentry" | .publishConfig = {"registry": "https://npm.pkg.github.com"}' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
